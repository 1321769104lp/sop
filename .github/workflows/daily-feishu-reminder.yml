name: Daily Feishu Reminder

on:
  schedule:
    # Retry window for Beijing time 13:00; check at 13:00 = UTC 05:00.
    - cron: "0 5 * * *"
    # Retry window for Beijing time 13:00; check at 13:15 = UTC 05:15.
    - cron: "15 5 * * *"
    # Retry window for Beijing time 13:00; check at 13:30 = UTC 05:30.
    - cron: "30 5 * * *"
    # Retry window for Beijing time 13:00; check at 13:45 = UTC 05:45.
    - cron: "45 5 * * *"
    # Retry window for Beijing time 13:00; check at 14:00 = UTC 06:00.
    - cron: "0 6 * * *"
    # Retry window for Beijing time 13:00; check at 14:30 = UTC 06:30.
    - cron: "30 6 * * *"
    # Retry window for Beijing time 13:00; check at 15:00 = UTC 07:00.
    - cron: "0 7 * * *"
    # Retry window for Beijing time 13:00; check at 16:00 = UTC 08:00.
    - cron: "0 8 * * *"
    # Retry window for Beijing time 13:00; check at 17:00 = UTC 09:00.
    - cron: "0 9 * * *"
    # Retry window for Beijing time 13:00; check at 18:00 = UTC 10:00.
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-actions.txt

      - name: Send Feishu reminder
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
          REMINDER_TIMES: "13:00"
          RETRY_WINDOW_MINUTES: "300"
          SEND_STATE_PATH: "data/github_send_state.json"
        run: python scripts/send_github_reminder.py

      - name: Persist send state
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f data/github_send_state.json ]; then
            git add data/github_send_state.json
          fi
          if ! git diff --cached --quiet; then
            git commit -m "Record Feishu reminder send state"
            git push
          fi
