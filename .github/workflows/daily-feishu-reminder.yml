name: Daily Feishu Reminder

on:
  schedule:
    # Send window 10:00-16:00; check at Beijing 10:00 = UTC 02:00.
    - cron: "0 2 * * *"
    # Send window 10:00-16:00; check at Beijing 10:40 = UTC 02:40.
    - cron: "40 2 * * *"
    # Send window 10:00-16:00; check at Beijing 11:20 = UTC 03:20.
    - cron: "20 3 * * *"
    # Send window 10:00-16:00; check at Beijing 12:00 = UTC 04:00.
    - cron: "0 4 * * *"
    # Send window 10:00-16:00; check at Beijing 12:40 = UTC 04:40.
    - cron: "40 4 * * *"
    # Send window 10:00-16:00; check at Beijing 13:20 = UTC 05:20.
    - cron: "20 5 * * *"
    # Send window 10:00-16:00; check at Beijing 14:00 = UTC 06:00.
    - cron: "0 6 * * *"
    # Send window 10:00-16:00; check at Beijing 14:40 = UTC 06:40.
    - cron: "40 6 * * *"
    # Send window 10:00-16:00; check at Beijing 15:20 = UTC 07:20.
    - cron: "20 7 * * *"
    # Send window 10:00-16:00; check at Beijing 16:00 = UTC 08:00.
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-actions.txt

      - name: Send Feishu reminder
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
          REMINDER_TIMES: "10:00"
          RETRY_WINDOW_MINUTES: "360"
          SEND_STATE_PATH: "data/github_send_state.json"
        run: python scripts/send_github_reminder.py

      - name: Persist send state
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f data/github_send_state.json ]; then
            git add data/github_send_state.json
          fi
          if ! git diff --cached --quiet; then
            git commit -m "Record Feishu reminder send state"
            git push
          fi
