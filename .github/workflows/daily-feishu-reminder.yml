name: Daily Feishu Reminder

on:
  schedule:
    # Send window 13:00-18:00; check at Beijing 13:00 = UTC 05:00.
    - cron: "0 5 * * *"
    # Send window 13:00-18:00; check at Beijing 13:33 = UTC 05:33.
    - cron: "33 5 * * *"
    # Send window 13:00-18:00; check at Beijing 14:07 = UTC 06:07.
    - cron: "7 6 * * *"
    # Send window 13:00-18:00; check at Beijing 14:40 = UTC 06:40.
    - cron: "40 6 * * *"
    # Send window 13:00-18:00; check at Beijing 15:13 = UTC 07:13.
    - cron: "13 7 * * *"
    # Send window 13:00-18:00; check at Beijing 15:47 = UTC 07:47.
    - cron: "47 7 * * *"
    # Send window 13:00-18:00; check at Beijing 16:20 = UTC 08:20.
    - cron: "20 8 * * *"
    # Send window 13:00-18:00; check at Beijing 16:53 = UTC 08:53.
    - cron: "53 8 * * *"
    # Send window 13:00-18:00; check at Beijing 17:27 = UTC 09:27.
    - cron: "27 9 * * *"
    # Send window 13:00-18:00; check at Beijing 18:00 = UTC 10:00.
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-actions.txt

      - name: Send Feishu reminder
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
          REMINDER_TIMES: "13:00"
          RETRY_WINDOW_MINUTES: "300"
          SEND_STATE_PATH: "data/github_send_state.json"
        run: python scripts/send_github_reminder.py

      - name: Persist send state
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f data/github_send_state.json ]; then
            git add data/github_send_state.json
          fi
          if ! git diff --cached --quiet; then
            git commit -m "Record Feishu reminder send state"
            git push
          fi
